title: Thomas Maillart
description: Research, grants & awards, and SDG-aligned hackathon impact
url: "https://thomasmaillart.org"
baseurl: ""

# Keep theme null; we use lightweight custom HTML/CSS in layouts.
theme: null

collections:
  research:
    output: true
  grants:
    output: true
  sdg_hackathons:
    output: true

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      type: research
    values:
      layout: "collection-item"
  - scope:
      type: grants
    values:
      layout: "collection-item"
  - scope:
      type: sdg_hackathons
    values:
      layout: "collection-item"

