# Site settings
title: thomas @ maillart.xyz
email: thomas@maillart.xyz
description: Research, grants & awards, and SDG-aligned hackathon impact
url: "https://maillart.xyz"
baseurl: ""
github_username: wazaahhh

# Keep theme null; we use lightweight custom HTML/CSS in layouts.
theme: null

# Ship the custom-domain file (Jekyll excludes CNAME by default).
include: ["CNAME"]

collections:
  research:
    output: true
  grants:
    output: true
  sdg_hackathons:
    output: true

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      type: research
    values:
      layout: "collection-item"
  - scope:
      type: grants
    values:
      layout: "collection-item"
  - scope:
      type: sdg_hackathons
    values:
      layout: "collection-item"
